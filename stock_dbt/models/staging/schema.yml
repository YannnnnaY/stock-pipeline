version: 2

models:
  - name: stg_stock_prices
    description: "Cleaned and standardized stock prices from raw source"
    columns:
      - name: ticker
        description: "Stock ticker symbol"
        tests:
          - not_null
      - name: date
        description: "Trading date"
        tests:
          - not_null
      - name: close
        description: "Closing price"
        tests:
          - not_null
      - name: volume
        description: "Trading volume"
        tests:
          - not_null

  - name: int_daily_returns
    description: "Daily percentage returns per stock"
    columns:
      - name: daily_return_pct
        description: "Daily return as a percentage"
        tests:
          - not_null

  - name: fct_stock_metrics
    description: "Final metrics including moving averages and volatility"
    columns:
      - name: ticker
        tests:
          - not_null
      - name: ma_7day
        tests:
          - not_null
      - name: ma_30day
        tests:
          - not_null
          